name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  renovate:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Run Renovate
        uses: renovatebot/github-action@v40.1.3
        env:
          LOG_LEVEL: debug
          RENOVATE_REPOSITORIES: ${{ github.repository }}
        with:
          configurationFile: renovate.json
          token: ${{ secrets.GITHUB_TOKEN }}