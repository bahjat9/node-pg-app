name: Renovate
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: renovatebot/github-action@v39
        with:
          configurationFile: renovate.json
          token: ${{ secrets.GITHUB_TOKEN }}