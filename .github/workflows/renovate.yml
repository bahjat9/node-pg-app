name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Run Renovate
        uses: renovatebot/github-action@v40.1.3
        with:
          configurationFile: renovate.json
          token: ${{ secrets.GITHUB_TOKEN }}